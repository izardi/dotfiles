CompileFlags:
  Add: [-xc++, -Wall, -std=c++20]
  Remove: -W* 
  Compiler: clang++

Diagnostics:
  UnusedIncludes: Strict
  ClangTidy:
    Add: [modernize*, clang-analyzer-*, cppcoreguidelines-*, modernize-*, performance-*, readability-*, bugprone-*]

InlayHints:
  Designators: Yes
  Enabled: Yes
  ParameterNames: Yes
  DeducedTypes: Yes

Hover:
  ShowAKA: Yes
